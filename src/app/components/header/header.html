<header class="flex items-center justify-between p-6 border-b border-gray-300 bg-white">
  <h1 class="text-xl font-bold tracking-widest text-gray-800">DLARRIVA</h1>
  <nav class="flex gap-4">
    <a routerLink="/" class="text-gray-500 hover:text-black transition-colors">Inicio</a>
    
    @if (authService.currentUser()) {
      <a routerLink="/contacto" class="text-gray-500 hover:text-black transition-colors">Contacto</a>
      
      <a routerLink="/dashboard" class="text-gray-500 hover:text-black transition-colors">Panel</a>
      <button (click)="cerrarSesion()" class="text-gray-500 hover:text-black transition-colors cursor-pointer">Salir</button>
    } @else {
      <a routerLink="/auth" class="text-gray-500 hover:text-black transition-colors">Acceder</a>
    }
  </nav>
</header>
